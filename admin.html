<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>汪喵管理系統 - 員工後台</title>
    <style>
        :root { color-scheme: light; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #2c3e50; color: #333; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 30px 20px; }
        .container { background: #fff; padding: 30px 40px; border-radius: 16px; width: 100%; max-width: 920px; box-sizing: border-box; align-self: flex-start; }
        h1, h2, h3 { color: #2c3e50; margin-top: 0; }
        h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .login-box { max-width: 400px; margin: auto; text-align: center; }
        input[type="password"], input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #34495e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        button:hover { background: #2c3e50; }
        .back-link { display: block; margin-top: 16px; font-size: 14px; color: #3498db; text-decoration: none; }

        .hidden { display: none; }
        .panel { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }

        /* Admin tabs */
        .admin-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid #eee; }
        .admin-tab { padding: 10px 24px; cursor: pointer; font-size: 14px; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; transition: 0.2s; }
        .admin-tab.active { color: #2c3e50; border-bottom-color: #8b7355; font-weight: 600; }

        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; margin-bottom: 10px; }
        .btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
        .btn-sm { width: auto; padding: 10px 22px; font-size: 14px; border-radius: 8px; }
        .btn-confirm { background: #3498db; }
        .btn-confirm:hover { background: #2980b9; }
        .btn-green  { background: #27ae60; }
        .btn-green:hover  { background: #219a52; }
        .btn-red    { background: #e74c3c; }
        .btn-red:hover    { background: #c0392b; }
        .btn-gray   { background: #95a5a6; }
        .btn-gray:hover   { background: #7f8c8d; }

        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
        th { background: #ecf0f1; padding: 10px 8px; color: #2c3e50; font-size: 12px; text-align: left; }
        td { padding: 10px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }

        /* 搜尋欄 */
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin: 0; }
        .search-bar button { width: auto; padding: 10px 20px; font-size: 14px; border-radius: 8px; background: #8b7355; }
        .search-bar button:hover { background: #6e5c44; }

        /* 設定區 */
        .setting-row { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid #eee; }
        .setting-label { flex: 1; font-size: 14px; color: #555; }
        .setting-label b { display: block; color: #2c3e50; margin-bottom: 4px; }
        .setting-input { width: 100px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; text-align: center; margin: 0; }
        .setting-save { width: auto; padding: 8px 20px; font-size: 14px; border-radius: 8px; background: #27ae60; }
        .setting-save:hover { background: #219a52; }

        /* 寵物檔案 */
        .pet-row { background: #f9f9f9; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #eee; }
        .pet-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .pet-row-name { font-size: 15px; font-weight: 600; color: #2c3e50; }
        .pet-row-owner { font-size: 12px; color: #888; }
        .pet-row-info { font-size: 13px; color: #666; line-height: 1.8; }
        .allergy-flag { color: #e74c3c; font-weight: 600; }
    </style>
</head>
<body>
    <!-- 登入 -->
    <div id="adminLoginSection" class="container login-box">
        <h2>🔒 系統後台登入</h2>
        <input type="password" id="adminPwd" placeholder="員工密碼">
        <button id="adminLoginBtn">登入管理中心</button>
        <a href="index.html" class="back-link">🔙 返回顧客首頁</a>
    </div>

    <!-- 後台主頁 -->
    <div id="adminDashboard" class="container hidden">
        <h1 style="display:flex;justify-content:space-between;align-items:center;font-size:20px;">
            🐾 汪喵精品旅館 — 員工管理系統
            <button id="adminLogoutBtn" style="width:auto;background:#e74c3c;padding:8px 16px;font-size:13px;border-radius:8px;">登出</button>
        </h1>

        <!-- Admin Tab 列 -->
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchAdminTab('bookings')">📋 預約管理</button>
            <button class="admin-tab" onclick="switchAdminTab('pets')">🐾 寵物檔案總覽</button>
            <button class="admin-tab" onclick="switchAdminTab('settings')">⚙️ 系統設定</button>
        </div>

        <!-- ── TAB: 預約管理 ── -->
        <div id="adminTabBookings">
            <!-- Step 1 -->
            <div class="panel">
                <h3 style="font-size:15px;margin-bottom:14px;">Step 1｜選擇要辦理的預約單</h3>
                <select id="pendingSelect"><option value="">載入中...</option></select>
                <button id="loadDetailsBtn" style="background:#8b7355;width:auto;padding:10px 24px;font-size:14px;border-radius:8px;">📋 讀取預約詳情</button>
            </div>

            <!-- Step 2 -->
            <div id="actionArea" class="panel hidden" style="background:#fff9f2;border-color:#ffe8d1;">
                <h3 style="font-size:15px;color:#e67e22;margin-bottom:14px;">Step 2｜辦理手續</h3>
                <div id="detailText" style="line-height:1.9;font-size:14px;margin-bottom:16px;"></div>

                <!-- 確認接受 -->
                <div id="confirmSection" style="background:#eaf4fb;border:1px solid #aed6f1;border-radius:10px;padding:14px 16px;margin-bottom:16px;">
                    <b style="color:#1a5276;font-size:14px;">📬 此預約尚未確認接受</b>
                    <p style="font-size:13px;color:#555;margin:6px 0 10px;">確認接受後，顧客將看到狀態變為 Confirmed（藍色）。</p>
                    <button id="confirmBookingBtn" class="btn-sm btn-confirm">✅ 確認接受此預約</button>
                </div>

                <!-- 疫苗核對 -->
                <div id="vaccineSection">
                    <label style="font-weight:bold;color:#d35400;font-size:14px;">🏥 現場安全核對 — 疫苗檢查：</label>
                    <select id="vaccineStatus" style="margin-top:8px;">
                        <option value="valid">✅ 疫苗紀錄有效 (Valid)</option>
                        <option value="expired">❌ 疫苗過期、未齊全 (Expired)</option>
                    </select>
                </div>

                <div class="btn-row">
                    <button id="checkInBtn" class="btn-sm btn-green">✅ 確認核准並辦理入住</button>
                    <button id="cancelBtn"  class="btn-sm btn-red">❌ 拒絕並取消單據</button>
                </div>
            </div>

            <!-- 全部紀錄 -->
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <h3 style="font-size:15px;margin:0;">📅 全客戶預約紀錄</h3>
                <button id="batchDeleteBtn" class="btn-sm btn-red" style="font-size:13px;padding:8px 16px;">🗑️ 批次清除已取消／已完成</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜尋飼主手機號碼 或 寵物名字...">
                <button id="searchBtn">搜尋</button>
                <button id="clearSearchBtn" style="background:#95a5a6;width:auto;padding:10px 16px;font-size:14px;border-radius:8px;">清除</button>
            </div>
            <table>
                <thead><tr><th>預約期間</th><th>寵物 / 飼主</th><th>服務項目</th><th>狀態</th><th>快速操作</th><th>刪除</th></tr></thead>
                <tbody id="allBookingsTable"></tbody>
            </table>
        </div>

        <!-- ── TAB: 寵物檔案總覽 ── -->
        <div id="adminTabPets" class="hidden">
            <div class="search-bar">
                <input type="text" id="petSearchInput" placeholder="搜尋飼主手機號碼 或 寵物名字...">
                <button id="petSearchBtn">搜尋</button>
                <button id="petClearBtn" style="background:#95a5a6;width:auto;padding:10px 16px;font-size:14px;border-radius:8px;">清除</button>
            </div>
            <div id="allPetsList"></div>
        </div>

        <!-- ── TAB: 系統設定 ── -->
        <div id="adminTabSettings" class="hidden">
            <h3 style="font-size:15px;margin-bottom:16px;">⚙️ 容量設定</h3>
            <div class="setting-row">
                <div class="setting-label">
                    <b>🏨 住宿房間數上限</b>
                    同一天最多可接受的住宿寵物數量。更改後即時生效，顧客預約頁日曆也會同步更新。
                </div>
                <input type="number" class="setting-input" id="settingRooms" min="1" max="100" value="10">
                <button class="setting-save btn-sm" id="saveSettingBtn">儲存</button>
            </div>
            <div class="setting-row">
                <div class="setting-label">
                    <b>🛁 洗澡美容每日時段數</b>
                    目前固定為 5 個時段（10:00、11:00、14:00、15:00、16:00），如需調整請聯繫開發人員修改程式碼。
                </div>
                <span style="font-size:18px;font-weight:bold;color:#8b7355;">5</span>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
