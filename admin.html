<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>汪喵管理系統 - 員工後台</title>
    <style>
        :root { color-scheme: light; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #2c3e50; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: #ffffff; padding: 30px 40px; border-radius: 16px; width: 100%; max-width: 800px; box-sizing: border-box; }
        h1, h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .login-box { max-width: 400px; margin: auto; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #34495e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #2c3e50; }
        .back-link { display: block; margin-top: 20px; font-size: 14px; color: #3498db; text-decoration: none; }

        .hidden { display: none; }
        .action-panel { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 10px; }

        .update-btn { background-color: #27ae60; width: 48%; }
        .danger-btn { background-color: #e74c3c; width: 48%; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; text-align: left; }
        th { background-color: #ecf0f1; padding: 8px; color: #2c3e50; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="adminLoginSection" class="container login-box">
        <h2>🔒 系統後台登入</h2>
        <input type="password" id="adminPwd" placeholder="員工密碼 (請輸入 admin123)">
        <button id="adminLoginBtn">登入管理中心</button>
        <a href="index.html" class="back-link">🔙 返回顧客首頁</a>
    </div>

    <div id="adminDashboard" class="container hidden">
        <h1 style="display: flex; justify-content: space-between; align-items: center; font-size: 24px;">
            🐾 櫃台報到管理系統
            <button id="adminLogoutBtn" style="width: auto; background: #e74c3c; padding: 8px 15px; font-size: 14px;">登出</button>
        </h1>

        <div class="action-panel">
            <h3 style="margin-top: 0;">1. 選擇待處理的預約單</h3>
            <select id="pendingSelect">
                <option value="">載入中...</option>
            </select>
            <button id="loadDetailsBtn">讀取預約資料</button>
        </div>

        <div id="actionArea" class="action-panel hidden" style="background:#fff9f2; border-color:#ffe8d1;">
            <h3 style="margin-top: 0; color: #e67e22;">2. 執行到店辦理手續 (Check-in Procedures)</h3>
            <div id="detailText" style="margin-bottom: 15px; line-height: 1.6; font-size: 15px;"></div>

            <label style="font-weight: bold; color: #d35400;">🏥 現場安全核對—疫苗檢查 (Vaccine Status)：</label>
            <select id="vaccineStatus">
                <option value="valid">✅ 疫苗紀錄有效 (Valid)</option>
                <option value="expired">❌ 疫苗過期、未齊全 (Expired)</option>
            </select>

            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <button id="checkInBtn" class="update-btn">✅ 確認核准並辦理入住</button>
                <button id="cancelBtn" class="danger-btn">❌ 拒絕入住並取消單據</button>
            </div>
        </div>

        <h3>📅 系統全體客戶紀錄總表</h3>
        <table>
            <thead><tr><th>預約期間</th><th>寵物名</th><th>服務項目 & 加購細項</th><th>狀態</th></tr></thead>
            <tbody id="allBookingsTable"></tbody>
        </table>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
