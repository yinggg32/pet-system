<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>汪喵管理系統 - 員工後台</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; margin: 0; padding: 40px; }
        .dashboard { background: white; border-radius: 15px; padding: 30px; max-width: 1000px; margin: auto; }
        h1 { color: #2c3e50; display: flex; justify-content: space-between; }
        .booking-card { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status-Pending { border-left: 5px solid #f39c12; }
        .status-Confirmed { border-left: 5px solid #3498db; }
        .status-CheckedIn { border-left: 5px solid #27ae60; }
        select { padding: 8px; border-radius: 5px; }
        .update-btn { padding: 8px 15px; background: #34495e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .badge { padding: 5px 10px; border-radius: 5px; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🐾 預約狀態管理中心 <button onclick="location.href='index.html'" style="font-size:14px;">返回前台</button></h1>
        <div id="bookingList">載入中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBSj96SOqhiQgMjOHoku3ARM52FAp5qyg",
            authDomain: "pet-system-609ed.firebaseapp.com",
            projectId: "pet-system-609ed",
            storageBucket: "pet-system-609ed.firebasestorage.app",
            messagingSenderId: "1025593733737",
            appId: "1:1025593733737:web:542bb4a633d6e88b0fe8f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadAdmin() {
            const q = query(collection(db, "bookings"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('bookingList');
            list.innerHTML = '';

            snap.forEach(d => {
                const b = d.data();
                const id = d.id;
                list.innerHTML += `
                    <div class="booking-card status-${b.status}">
                        <div>
                            <strong>${b.date} ${b.time}</strong> - ${b.petName} (${b.service}) <br>
                            <small>飼主：${b.ownerId}</small>
                        </div>
                        <div>
                            <select id="status-${id}">
                                <option value="Pending" ${b.status==='Pending'?'selected':''}>待確認 (Pending)</option>
                                <option value="Confirmed" ${b.status==='Confirmed'?'selected':''}>已收訂金 (Confirmed)</option>
                                <option value="CheckedIn" ${b.status==='CheckedIn'?'selected':''}>已報到 (CheckedIn)</option>
                                <option value="Cancelled" ${b.status==='Cancelled'?'selected':''}>取消 (Cancelled)</option>
                            </select>
                            <button class="update-btn" onclick="updateStatus('${id}')">更新狀態</button>
                        </div>
                    </div>
                `;
            });
        }

        window.updateStatus = async (id) => {
            const newStatus = document.getElementById(`status-${id}`).value;
            await updateDoc(doc(db, "bookings", id), { status: newStatus });
            alert("狀態已更新！");
            loadAdmin();
        };

        loadAdmin();
    </script>
</body>
</html>
