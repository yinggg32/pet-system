<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>汪喵管理系統 - 員工後台</title>
    <style>
        :root { color-scheme: light; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #2c3e50; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: #ffffff; padding: 30px 40px; border-radius: 16px; width: 100%; max-width: 800px; }
        h1, h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* 登入區 */
        .login-box { max-width: 400px; margin: auto; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #34495e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .back-link { display: block; margin-top: 20px; font-size: 14px; color: #3498db; text-decoration: none; }

        /* 管理區 */
        .hidden { display: none; }
        .booking-card { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; background: #fcfcfc;}
        .status-Pending { border-left: 5px solid #f39c12; }
        .status-Confirmed { border-left: 5px solid #3498db; }
        .status-CheckedIn { border-left: 5px solid #27ae60; }
        .status-Cancelled { border-left: 5px solid #e74c3c; opacity: 0.6; }
        select.status-select { padding: 8px; border-radius: 5px; width: 180px; margin-right: 10px; border: 1px solid #ccc;}
        .update-btn { padding: 8px 15px; width: auto; background: #27ae60; }
    </style>
</head>
<body>
    <div id="adminLoginSection" class="container login-box">
        <h2>🔒 系統後台登入</h2>
        <input type="password" id="adminPwd" placeholder="員工密碼 (輸入 admin123)">
        <button id="adminLoginBtn">登入管理中心</button>
        <a href="index.html" class="back-link">🔙 返回顧客首頁</a>
    </div>

    <div id="adminDashboard" class="container hidden">
        <h1 style="display: flex; justify-content: space-between; align-items: center;">
            🐾 預約狀態管理中心
            <button id="adminLogoutBtn" style="width: auto; background: #e74c3c; padding: 8px 15px; font-size: 14px;">登出</button>
        </h1>
        <div id="bookingList" style="margin-top: 20px;">資料載入中...</div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
