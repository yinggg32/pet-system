<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>汪喵精品旅館 - 顧客預約中心</title>
    <style>
        :root { --primary: #8b7355; --bg: #f9f6f0; --accent: #e67e22; }
        body { font-family: 'PingFang TC', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1548191265-cc70d3d45ba1?q=80&w=2070&auto=format&fit=crop') center/cover;
            height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .hero h1 { font-size: 36px; margin: 0; letter-spacing: 2px; }
        .hero p { font-size: 18px; opacity: 0.9; }

        .container { max-width: 600px; margin: -50px auto 50px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 40px; position: relative; z-index: 2; }

        h2 { color: var(--primary); border-bottom: 2px solid #f0e9df; padding-bottom: 15px; font-size: 22px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(139, 115, 85, 0.2); }

        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .btn:hover { background: #6e5c44; transform: translateY(-2px); }
        .btn-sec { background: #eee; color: #666; margin-top: 10px; }

        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; background: #fcfbf9; color: var(--primary); font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #f9f6f0; font-size: 14px; vertical-align: middle; }

        .admin-entry { text-align: center; margin-top: 40px; font-size: 12px; color: #ccc; text-decoration: none; display: block; }

        /* 加購區塊專用樣式 */
        .addon-box { background: #ffffff; padding: 15px; border-radius: 10px; border: 1px dashed var(--primary); margin-top: 15px; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; margin: 0; cursor: pointer; font-weight: normal; color: #333; }
        .checkbox-label input { width: auto; transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>給毛孩最好的度假體驗</h1>
        <p>專業美容・星級住宿・全方位照護</p>
    </div>

    <div class="container">
        <div id="authSection">
            <h2>會員登入 / 快速註冊</h2>
            <div class="form-group">
                <label>手機號碼 (登入帳號)</label>
                <input type="text" id="phoneInput" placeholder="請輸入您的手機">
            </div>
            <div class="form-group">
                <label>密碼 (Password)</label>
                <input type="password" id="passwordInput" placeholder="請輸入密碼">
            </div>
            <div id="regFields" class="hidden">
                <div class="form-group">
                    <label>飼主姓名</label>
                    <input type="text" id="nameInput" placeholder="請輸入姓名 (僅註冊需要)">
                </div>
            </div>
            <button class="btn" id="loginBtn">立即登入</button>
            <button class="btn btn-sec" id="toggleRegBtn">還不是會員？我要註冊</button>
            <button class="btn hidden" id="registerBtn">確認註冊</button>
        </div>

        <div id="dashboardSection" class="hidden">
            <h2 id="userWelcome">歡迎回家的毛爸媽</h2>

            <div style="background: #fff9f2; padding: 20px; border-radius: 15px; border: 1px solid #ffe8d1;">
                <h3 style="margin-top:0; font-size: 16px;">✨ 線上預約服務</h3>
                <div class="form-group">
                    <label>寵物名字</label>
                    <input type="text" id="petNameInput" placeholder="例如: 糰子">
                </div>

                <div class="form-group">
                    <label>選擇服務</label>
                    <select id="serviceSelect">
                        <option value="洗澡美容">🛁 洗澡美容 (Grooming)</option>
                        <option value="星級住宿">🏨 星級住宿 (Boarding)</option>
                    </select>
                </div>

                <div id="groomingBox" style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>預約日期</label>
                        <input type="date" id="dateInput">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>預約時段</label>
                        <select id="timeSelect">
                            <option value="10:00">10:00 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="14:00">02:00 PM</option>
                            <option value="15:00">03:00 PM</option>
                            <option value="16:00">04:00 PM</option>
                        </select>
                    </div>
                </div>

                <div id="boardingBox" class="hidden">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>入住日 (Check-in)</label>
                            <input type="date" id="startDateInput">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>退房日 (Check-out)</label>
                            <input type="date" id="endDateInput">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>預期到店辦理手續時間</label>
                        <select id="boardingTimeSelect">
                            <option value="14:00">14:00 PM</option>
                            <option value="15:00">15:00 PM</option>
                            <option value="16:00">16:00 PM</option>
                        </select>
                    </div>

                    <div class="addon-box">
                        <label style="color: var(--primary); margin-bottom: 5px;">🎁 住宿專屬加購特惠：</label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="addOnGrooming">
                            <span>加購「退房前精油頂級洗澡美容服務」（加購驚喜價 +$500）</span>
                        </label>
                    </div>
                </div>

                <button class="btn" id="bookBtn">立即送出預約</button>
            </div>

            <h3 style="margin-top: 40px; color: var(--primary);">📋 我的預約紀錄</h3>
            <table id="myRecords">
                <thead><tr><th>預約時間</th><th>寵物與服務</th><th>狀態</th><th>操作</th></tr></thead>
                <tbody id="myBookingsTable"></tbody>
            </table>
            <button class="btn btn-sec" id="logoutBtn">登出</button>
        </div>

        <a href="admin.html" class="admin-entry">🛠️ 員工登入入口 (Admin Portal)</a>
    </div>

    <script type="module" src="customer.js"></script>
</body>
</html>
