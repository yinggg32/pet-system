<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Pet System - Customer Portal</title>
    <style>
        :root { color-scheme: light; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f9f6f0; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: #ffffff; padding: 30px 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #5c4d43; font-size: 22px; border-bottom: 2px solid #f0e9df; padding-bottom: 10px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #666; margin-top: 15px;}
        input, select { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: #8b7355; }
        button { width: 100%; padding: 12px; background-color: #8b7355; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        button:hover { background-color: #6e5c44; }

        /* 隱藏區塊用的 class */
        .hidden { display: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; text-align: left; }
        th { background-color: #f0e9df; padding: 8px; color: #5c4d43; }
        td { padding: 8px; border-bottom: 1px solid #f9f6f0; }

        .admin-link { display: block; text-align: center; margin-top: 20px; font-size: 12px; color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🐶 寵物預約系統 (顧客端)</h2>

        <div id="loginSection">
            <p style="color: #666; font-size: 14px;">請輸入您的飼主編號來登入系統。</p>
            <label>飼主編號 (Owner ID):</label>
            <input type="text" id="loginIdInput" placeholder="例如: O-123">
            <button id="loginBtn">登入系統</button>
        </div>

        <div id="dashboardSection" class="hidden">
            <h3 style="color: #8b7355; border-bottom: 1px solid #f0e9df; padding-bottom: 5px;">➕ 預約新服務</h3>
            <label>寵物名字 (Pet Name):</label>
            <input type="text" id="petNameInput" placeholder="例如: Buddy">

            <label>服務項目 (Service):</label>
            <select id="serviceSelect">
                <option value="Grooming">洗澡美容 (Grooming)</option>
                <option value="Boarding">寵物住宿 (Boarding)</option>
            </select>

            <button id="bookBtn">送出預約</button>

            <h3 style="color: #8b7355; border-bottom: 1px solid #f0e9df; padding-bottom: 5px; margin-top: 30px;">📅 我的預約紀錄</h3>
            <table>
                <thead>
                    <tr><th>預約單號</th><th>寵物名</th><th>服務</th><th>狀態</th></tr>
                </thead>
                <tbody id="myBookingsTable"></tbody>
            </table>

            <button id="logoutBtn" style="background-color: #ccc; color: #333; margin-top: 30px;">登出</button>
        </div>

        <a href="admin.html" class="admin-link">🛠️ 切換至櫃台人員系統 (Admin Portal)</a>
    </div>

    <script type="module" src="customer.js"></script>
</body>
</html>
