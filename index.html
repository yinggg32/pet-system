<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Pet System - 顧客首頁</title>
    <style>
        :root { color-scheme: light; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f9f6f0; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: #ffffff; padding: 30px 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }

        /* 廣告視覺區塊 */
        .hero-banner { background: url('https://images.unsplash.com/photo-1541781774459-bb2af2f05b55?auto=format&fit=crop&w=800&q=80') center/cover; height: 180px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .hero-banner::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); }
        .hero-banner h1 { color: white; position: relative; z-index: 1; font-size: 24px; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); margin: 0; }

        h2 { margin-top: 0; color: #5c4d43; font-size: 20px; border-bottom: 2px solid #f0e9df; padding-bottom: 10px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #666; margin-top: 15px;}
        input, select { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background-color: #8b7355; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        button.secondary { background-color: #f0e9df; color: #5c4d43; margin-top: 10px; }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; text-align: left; }
        th { background-color: #f0e9df; padding: 8px; color: #5c4d43; }
        td { padding: 8px; border-bottom: 1px solid #f9f6f0; }
        .admin-link { display: block; text-align: center; margin-top: 25px; font-size: 13px; color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-banner">
            <h1>🐾 汪喵星級度假與美容中心</h1>
        </div>

        <div id="authSection">
            <h2>會員登入 / 註冊</h2>
            <p style="font-size: 13px; color: #888;">請輸入您的手機號碼作為會員帳號。</p>

            <label>手機號碼 (Phone):</label>
            <input type="text" id="phoneInput" placeholder="例如: 0912345678">

            <div id="registerFields" class="hidden">
                <label>飼主姓名 (Name):</label>
                <input type="text" id="nameInput" placeholder="請輸入您的姓名">
            </div>

            <button id="loginBtn">登入</button>
            <button id="showRegBtn" class="secondary">還不是會員？點此註冊</button>
            <button id="registerBtn" class="hidden">確認註冊並登入</button>
            <button id="cancelRegBtn" class="secondary hidden">取消註冊</button>
        </div>

        <div id="dashboardSection" class="hidden">
            <h2 id="welcomeMsg">歡迎！</h2>

            <h3 style="color: #8b7355; border-bottom: 1px solid #f0e9df; padding-bottom: 5px;">➕ 預約新服務</h3>
            <label>寵物名字 (Pet Name):</label>
            <input type="text" id="petNameInput" placeholder="例如: 圓仔">
            <label>服務項目 (Service):</label>
            <select id="serviceSelect">
                <option value="Grooming">洗澡美容 (Grooming)</option>
                <option value="Boarding">寵物住宿 (Boarding)</option>
            </select>
            <button id="bookBtn">送出預約單</button>

            <h3 style="color: #8b7355; border-bottom: 1px solid #f0e9df; padding-bottom: 5px; margin-top: 30px;">📅 我的預約紀錄</h3>
            <table>
                <thead><tr><th>單號</th><th>寵物名</th><th>服務</th><th>狀態</th></tr></thead>
                <tbody id="myBookingsTable"></tbody>
            </table>

            <button id="logoutBtn" class="secondary" style="margin-top: 30px;">登出帳號</button>
        </div>

        <a href="admin.html" class="admin-link">🛠️ 切換至工作人員專區</a>
    </div>

    <script type="module" src="customer.js"></script>
</body>
</html>
